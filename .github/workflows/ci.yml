name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  laravel:
    name: Laravel Tests
    runs-on: ubuntu-latest
    env:
      SMARTDENTQUEUE_PHP_IMAGE: shzzzki0000/appdev:tagname
    defaults:
      run:
        working-directory: laravel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull Docker images
        run: docker compose pull php db

      - name: Start Docker containers
        run: docker compose up --no-build -d db php

      - name: Install Composer dependencies
        run: docker compose exec -T php composer install --no-interaction --prefer-dist

      - name: Prepare Laravel environment
        run: docker compose exec -T php sh -c "cp .env.pipeline .env && php artisan key:generate"

      - name: Run Laravel migrations
        run: docker compose exec -T php php artisan migrate --force

      - name: Run PHPUnit tests
        run: docker compose exec -T php vendor/bin/phpunit

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs db php

      - name: Stop Docker containers
        if: always()
        run: docker compose down -v

  flutter:
    name: Flutter Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Flutter automated tests
        run: flutter test
