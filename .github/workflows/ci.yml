name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  laravel:
    name: Laravel Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker containers
        run: docker compose build

      - name: Start Docker containers
        run: docker compose up -d

      - name: Prepare Laravel environment
        run: docker compose exec -T app sh -c "cp .env.pipeline .env && php artisan key:generate"

      - name: Run Laravel migrations
        run: docker compose exec -T app php artisan migrate --force

      - name: Run Laravel tests
        run: docker compose exec -T app php artisan test

      - name: Build Laravel frontend assets
        run: docker compose exec -T app npm run build

      - name: Stop Docker containers
        if: always()
        run: docker compose down

  flutter:
    name: Flutter Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Flutter automated tests
        run: flutter test

      - name: Build Android debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk