name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-main
  cancel-in-progress: true

jobs:
  laravel:
    name: Laravel Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laravel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, pdo_sqlite, fileinfo
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Vite dependencies
        run: npm install

      - name: Prepare Laravel pipeline environment
        run: |
          cp .env.pipeline .env
          php artisan key:generate

      - name: Run Laravel automated tests
        run: php artisan test

      - name: Build Laravel frontend assets
        run: npm run build

  flutter:
    name: Flutter Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Flutter automated tests
        run: flutter test

      - name: Build Android debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk
