services:
  php:
    build: .
    working_dir: /var/www
    environment:
      - DB_HOST=db
    volumes:
      - ./:/var/www
    depends_on:
      db:
        condition: service_healthy
  nginx:
    image: nginx:1.29.5-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: mysql:8.4.8
    container_name: smartdentque_mysqlDB
    environment:
      - MYSQL_DATABASE=smartdentque
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:5.2.3-apache
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
    depends_on:
      - db

volumes:
  mysql_data:
